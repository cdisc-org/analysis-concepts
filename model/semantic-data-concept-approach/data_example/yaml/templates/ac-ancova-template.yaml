# =============================================================================
# Analysis Concept: ANCOVA (Library Template)
# =============================================================================
#
# Template ID: T_AC_ANCOVA
# Name: ANCOVA_ChangeFromBaseline
# Description: ANCOVA analysis of change from baseline with baseline, site,
#              and treatment as covariates
#
# This is a LIBRARY-LEVEL template - attribute values are NOT bound.
# Study-level instances bind specific values (see ac-ancova-study-instance.yaml)
#
# Pattern: Template/Instance separation (D3: Progressive Refinement)
# Source: ac-ancova-template.tsk
# =============================================================================

template:
  id: T_AC_ANCOVA
  name: ANCOVA_ChangeFromBaseline
  type: AnalysisConcept
  description: "ANCOVA analysis of change from baseline with baseline, site, and treatment as covariates"


# =============================================================================
# IMPORTED CONCEPTS
# =============================================================================

imports:
  - concepts-data.Subject
  - concepts-data.Treatment
  - concepts-data.Site
  - concepts-data.Parameter
  - concepts-data.Visit
  - concepts-data.ChangeValue
  - concepts-data.BaselineValue
  - concepts-data.ITTFlag
  - concepts-data.EfficacyFlag
  - concepts-data.ImputationMethod
  - concepts-data.LeastSquaresMean
  - concepts-data.StandardError
  - concepts-data.ConfidenceLower
  - concepts-data.ConfidenceUpper
  - concepts-data.PValue
  - concepts-data.TreatmentDifference


# =============================================================================
# CUBES
# =============================================================================

cubes:

  # ---------------------------------------------------------------------------
  # INPUT CUBE: ANCOVAInput
  # ---------------------------------------------------------------------------
  - name: ANCOVAInput
    label: "Input dataset for ANCOVA analysis"
    namespace: "http://cdisc.org/ac/template/T_AC_ANCOVA#"
    role: input

    structure:
      dimensions:
        - name: subject
          datatype: Identifier
          is_a: Subject
          # Resolution: subject -> Subject <- USUBJID (ADaM)

        - name: treatment
          datatype: CodedValue
          is_a: Treatment
          role: factor
          # Resolution: treatment -> Treatment <- TRT01A/TRTP (ADaM)

        - name: site
          datatype: CodedValue
          is_a: Site
          # Resolution: site -> Site <- SITEID (ADaM)

      measures:
        - name: change_value
          datatype: Numeric
          is_a: ChangeValue
          role: dependent
          # Resolution: change_value -> ChangeValue <- CHG (ADaM)

        - name: baseline_value
          datatype: Numeric
          is_a: BaselineValue
          role: covariate
          # Resolution: baseline_value -> BaselineValue <- BASE (ADaM)

      attributes:
        - name: parameter
          datatype: CodedValue
          is_a: Parameter
          # Resolution: parameter -> Parameter <- PARAMCD (ADaM)

        - name: timepoint
          datatype: Text
          is_a: Visit
          # Resolution: timepoint -> Visit <- AVISIT (ADaM)

        - name: population_flag
          datatype: Flag
          is_a: EfficacyFlag
          # Resolution: population_flag -> EfficacyFlag <- EFFFL (ADaM)

        - name: imputation_method
          datatype: CodedValue
          is_a: ImputationMethod


  # ---------------------------------------------------------------------------
  # OUTPUT CUBE 1: TreatmentResults (LS Means per treatment group)
  # ---------------------------------------------------------------------------
  - name: TreatmentResults
    label: "LS Means by Treatment Group"
    namespace: "http://cdisc.org/ac/template/T_AC_ANCOVA#"
    role: output
    aggregation_level: treatment

    structure:
      dimensions:
        - name: treatment
          datatype: CodedValue
          is_a: Treatment

      measures:
        - name: lsmean
          datatype: Numeric
          is_a: LeastSquaresMean
          # Resolution: lsmean -> LeastSquaresMean <- AnalysisResult.estimate (ARS)

        - name: lsmean_se
          datatype: Numeric
          is_a: StandardError
          # Resolution: lsmean_se -> StandardError <- AnalysisResult.standardError (ARS)

        - name: ci_lower
          datatype: Numeric
          is_a: ConfidenceLower
          # Resolution: ci_lower -> ConfidenceLower <- AnalysisResult.confidenceInterval.lower (ARS)

        - name: ci_upper
          datatype: Numeric
          is_a: ConfidenceUpper
          # Resolution: ci_upper -> ConfidenceUpper <- AnalysisResult.confidenceInterval.upper (ARS)

      attributes:
        - name: parameter
          datatype: CodedValue
          is_a: Parameter

        - name: timepoint
          datatype: Text
          is_a: Visit

        - name: population_flag
          datatype: Flag
          is_a: EfficacyFlag


  # ---------------------------------------------------------------------------
  # OUTPUT CUBE 2: ComparisonResults (Pairwise treatment comparisons)
  # ---------------------------------------------------------------------------
  - name: ComparisonResults
    label: "Pairwise Treatment Comparisons"
    namespace: "http://cdisc.org/ac/template/T_AC_ANCOVA#"
    role: output
    aggregation_level: treatment_pair

    structure:
      dimensions:
        - name: treatment
          datatype: CodedValue
          is_a: Treatment

        - name: comparison_group
          datatype: CodedValue
          is_a: Treatment

      measures:
        - name: lsmean_diff
          datatype: Numeric
          is_a: TreatmentDifference
          # Resolution: lsmean_diff -> TreatmentDifference <- AnalysisResult.contrast (ARS)

        - name: p_value
          datatype: Numeric
          is_a: PValue
          # Resolution: p_value -> PValue <- AnalysisResult.pValue (ARS)

        - name: ci_lower
          datatype: Numeric
          is_a: ConfidenceLower

        - name: ci_upper
          datatype: Numeric
          is_a: ConfidenceUpper

      attributes:
        - name: parameter
          datatype: CodedValue
          is_a: Parameter

        - name: timepoint
          datatype: Text
          is_a: Visit

        - name: population_flag
          datatype: Flag
          is_a: EfficacyFlag


# =============================================================================
# SLICES
# =============================================================================

slices:
  - name: ANCOVAInputSlice
    cube: ANCOVAInput
    description: "Template-level slice (no fixed values)"

    # Dimensions that vary (remain multi-valued for analysis)
    vary:
      - subject
      - treatment
      - site

    # Measures included in the analysis
    measures:
      - change_value
      - baseline_value

    # At template level: no fix clause
    # Study instances would add:
    # fix:
    #   parameter: "ADAS-Cog(11)"
    #   timepoint: "Week 24"
    #   population_flag: "Y"
    #   imputation_method: "LOCF"


# =============================================================================
# MODELS
# =============================================================================

models:
  - name: FitANCOVAModel
    input: ANCOVAInputSlice
    outputs:
      - TreatmentResults
      - ComparisonResults

    # Wilkinson formula notation using semantic names
    formula: "change_value ~ baseline_value + site + treatment"
    formula_notation: R

    specification:
      family: Gaussian
      link: Identity

    comparison:
      method: LSMeans
      type: pairwise
      factor: treatment

    # Resolution through DataConcept hub:
    #
    #   Formula term        Cube element       DataConcept      ADaM variable
    #   ─────────────────────────────────────────────────────────────────────
    #   change_value    ->  is_a           ->  ChangeValue  <-  is_a  <- CHG
    #   baseline_value  ->  is_a           ->  BaselineValue <- is_a  <- BASE
    #   site            ->  is_a           ->  Site         <-  is_a  <- SITEID
    #   treatment       ->  is_a           ->  Treatment    <-  is_a  <- TRT01A
    #
    # Executed as ADaM: CHG ~ BASE + SITEID + TRT01A


# =============================================================================
# OUTPUT RELATIONSHIPS
# =============================================================================
#
# The model produces two output cubes:
#
# 1. TreatmentResults: One row per treatment group
#    - Contains: lsmean, lsmean_se, ci_lower, ci_upper
#    - Dimensions: [treatment]
#
# 2. ComparisonResults: One row per treatment pair
#    - Contains: lsmean_diff, p_value, ci_lower, ci_upper
#    - Dimensions: [treatment, comparison_group]
#
# =============================================================================


# =============================================================================
# CONNECTOR RESOLUTION DIAGRAM
# =============================================================================
#
#                     ┌─────────────────────┐
#                     │    DataConcept      │
#                     │    ChangeValue      │
#                     │    (pure semantic)  │
#                     └──────────▲──────────┘
#                                │
#            ┌───────────────────┼───────────────────┐
#            │                   │                   │
#       is_a │              is_a │              is_a │
#            │                   │                   │
#   ┌────────┴────────┐ ┌────────┴────────┐ ┌────────┴────────┐
#   │ Cube Measure    │ │ ADaM Variable   │ │ USDM Element    │
#   │ change_value    │ │ CHG             │ │ Observation.    │
#   │ (this file)     │ │ (model-mappings)│ │ change          │
#   └─────────────────┘ └─────────────────┘ └─────────────────┘
#
# Resolution for different target models:
#   ADaM context:  change_value -> ChangeValue <- CHG
#   USDM context:  change_value -> ChangeValue <- Observation.change
#   SDTM context:  change_value -> ChangeValue <- (derived, not stored)
#
# =============================================================================
