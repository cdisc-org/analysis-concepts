# =============================================================================
# Sentences and Phrases: Natural Language Description Composition
# =============================================================================
#
# This file defines the Sentence/Phrase pattern for composing human-readable
# analysis descriptions from structured, semantically-linked components.
#
# Relationship terminology:
#   is_a (Phrase -> DataConcept):
#     - Better term: "typed_by"
#     - Meaning: The DataConcept types/constrains the phrase's parameter value
#     - The phrase parameter must be a valid instance of this concept
#
#   fix (Phrase -> Slice):
#     - Better term: "binds_to" or "provides_value_for"
#     - Meaning: The phrase value flows to the slice fix clause attribute
#     - Enables traceability: natural language phrase -> data filter
#
# Source: sentences.tsk
# =============================================================================


# =============================================================================
# IMPORTED CONCEPTS AND INSTANCES
# =============================================================================

imports:
  # Data concepts
  - concepts-data.Parameter
  - concepts-data.Visit
  - concepts-data.EfficacyFlag
  - concepts-data.ImputationMethod

  # Analysis instance
  - ac-ancova-study-instance.ANCOVASlice_ADAS_Week24
  - ac-ancova-study-instance.S_AC_001


# =============================================================================
# STATIC PHRASES (No parameters - reusable across studies)
# =============================================================================

static_phrases:

  - name: ResultPhrase
    label: "Analysis of the change from baseline"
    role: as_result
    text: "Analysis of the change from baseline"

  - name: MethodPhrase_ANCOVA
    label: "ANCOVA Method Description"
    role: as_method
    text: "using ANCOVA model with the baseline score, site, and treatment included as independent variables"

  - name: ComparisonPhrase
    label: "Pairwise Comparisons"
    role: as_comparison
    text: "Pairwise comparisons among the treatment groups will be performed"

  - name: AlphaPhrase_005
    label: "Significance Level 0.05"
    role: as_alpha
    text: "evaluated at a significance level of 0.05"
    value: 0.05


# =============================================================================
# PARAMETERIZED PHRASES (Study-specific values)
# =============================================================================
#
# Phrases with variable parameters that users fill in at study time.
#
# Data flow:
#   User provides value -> Phrase.value -> fix -> Slice.fix.attribute -> Cube filter
#

parameterized_phrases:

  # Scope phrase - defines which parameter is being analyzed
  - name: ScopePhrase_ADAS
    label: "ADAS-Cog(11) Scope"
    role: as_scope
    is_a: Parameter
    text: "in ADAS-Cog(11)"
    value: "ADAS-Cog(11)"
    binds_to:
      slice: ANCOVASlice_ADAS_Week24
      attribute: parameter

  # Timepoint phrase - defines the analysis visit
  - name: TimepointPhrase_Week24
    label: "Week 24 Timepoint"
    role: as_timepoint
    is_a: Visit
    text: "to Week 24"
    value: "Week 24"
    binds_to:
      slice: ANCOVASlice_ADAS_Week24
      attribute: timepoint

  # Population phrase - defines the analysis population
  - name: PopulationPhrase_Efficacy
    label: "Efficacy Population"
    role: as_population
    is_a: EfficacyFlag
    text: "on the efficacy population"
    value: "Y"
    binds_to:
      slice: ANCOVASlice_ADAS_Week24
      attribute: population_flag

  # Imputation phrase - defines missing data handling method
  - name: ImputationPhrase_LOCF
    label: "LOCF Imputation"
    role: as_imputation
    is_a: ImputationMethod
    text: "with LOCF imputation for any missing values at Week 24"
    value: "LOCF"
    binds_to:
      slice: ANCOVASlice_ADAS_Week24
      attribute: imputation_method


# =============================================================================
# SENTENCE DEFINITION
# =============================================================================
#
# A Sentence is composed of multiple Phrases and describes an AnalysisInstance.
# The full text can be generated by combining phrase texts in order.
#

sentences:

  - name: ANCOVASentence_ADAS_Week24
    label: "ANCOVA Analysis Description"

    # This sentence describes the study-level analysis instance
    describes: S_AC_001

    # Full composed text
    text: >
      Analysis of the change from baseline in ADAS-Cog(11) to Week 24
      using ANCOVA model with the baseline score, site, and treatment
      included as independent variables. The analysis will be performed
      on the efficacy population with LOCF imputation for any missing
      values at Week 24. Pairwise comparisons among the treatment groups
      will be performed, evaluated at a significance level of 0.05.

    # Composed from these phrases (order determines text assembly)
    composed_of:
      - ResultPhrase
      - ScopePhrase_ADAS
      - TimepointPhrase_Week24
      - MethodPhrase_ANCOVA
      - PopulationPhrase_Efficacy
      - ImputationPhrase_LOCF
      - ComparisonPhrase
      - AlphaPhrase_005


# =============================================================================
# DATA FLOW DIAGRAM
# =============================================================================
#
# User fills parameter --> Phrase.value --> binds_to --> Slice.fix.attribute
#                                                               |
#                                                               | constrains
#                                                               v
#                                                         Cube dimension/
#                                                         attribute values
#
# Example flow for ScopePhrase_ADAS:
#
#   User types: "ADAS-Cog(11)"
#        |
#        v
#   ScopePhrase_ADAS.value = "ADAS-Cog(11)"
#        |
#        | binds_to
#        v
#   ANCOVASlice_ADAS_Week24.fix.parameter = "ADAS-Cog(11)"
#        |
#        | constrains
#        v
#   ADQSADAS_ANCOVA cube filtered to PARAMCD = "ACTOT11"
#
# =============================================================================


# =============================================================================
# PHRASE ROLES REFERENCE
# =============================================================================
#
# Roles provide semantic categorization of phrases:
#
#   as_result      - What is being analyzed (e.g., "change from baseline")
#   as_scope       - Parameter/endpoint (e.g., "in ADAS-Cog(11)")
#   as_timepoint   - Visit/timepoint (e.g., "to Week 24")
#   as_method      - Statistical method (e.g., "using ANCOVA model")
#   as_population  - Analysis population (e.g., "on efficacy population")
#   as_imputation  - Missing data handling (e.g., "with LOCF imputation")
#   as_comparison  - Comparison type (e.g., "pairwise comparisons")
#   as_alpha       - Significance level (e.g., "at 0.05")
#
# =============================================================================
