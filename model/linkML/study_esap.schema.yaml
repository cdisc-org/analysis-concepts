$id: https://cdisc.org/acdc/study_esap
$schema: https://json-schema.org/draft/2019-09/schema
title: study_esap
description: 'Study eSAP Model schema. Binds Methods to a study''s objectives, endpoints, and estimands by full-copy of library
  TransformationTemplates: each study Transformation copies its template''s cube structure (twin qb:DataStructureDefinitions),
  slice templates, sliceKeys, methodConfigurations, and validSmartPhrases — and adds study-resolved values (sliceKeys[].value
  filled in, slice constraint {placeholder} tokens substituted, configurationValues, hasPhraseInstance, resolvedExpression).
  The Method is the only library artefact that stays referenced (via usesMethod); everything else is copied so the eSAP is
  self-contained for regulatory reproducibility. Built on the CDISC USDM v4.0 study structure with cross-references to ARS
  Analysis definitions. Aligned with Transformation Library v0.7 (Option B strict twin DSDs per WG method-schema-design 2026-05-27)
  and Method schema v0.9.1 (conceptId-keyed, inputs[]/outputs[] shape). Validates study eSAP instance files.'
version: 0.5.0
type: object
additionalProperties: true
properties:
  model:
    type: string
    const: eSAP
    description: Model identifier
  version:
    type: string
    description: Semantic version of the study eSAP model
  description:
    type:
    - string
    - 'null'
    description: Human-readable description of the model
  $provenance:
    type: object
    description: Declares external model dependencies — bill of materials for referenced entities
    properties:
      usdm:
        type: object
        description: CDISC Unified Study Definitions Model — source for study structure entities
        properties:
          model:
            type: string
            const: CDISC Unified Study Definitions Model
          version:
            type: string
          uri:
            type: string
            format: uri
          entities:
            type: array
            items:
              type: string
            description: USDM entity names referenced in this schema
      transformation_library:
        type: object
        description: 'Reusable Transformation & Method library — source for transformation templates, smart phrases, methods,
          and method outputs. v0.7+: methods are externalised into per-method files (one M_*.json per method); the library
          file itself carries only transformation templates, smartPhrases, and roleDefinitions. Transformation templates use
          twin DataStructureDefinitions (inputDataStructure / outputDataStructure) per W3C qb vocabulary.'
        properties:
          model:
            type: string
          version:
            type: string
            description: Library version (e.g. '0.7')
          schemaRef:
            type: string
            format: uri
          methodsRef:
            type: string
            description: Path or URI pattern for per-method files (e.g. 'lib/methods/{analyses,derivations}/M_*.json')
          entities:
            type: array
            items:
              type: string
      ars:
        type: object
        description: CDISC Analysis Results Standard — source for analysis result definitions
        properties:
          model:
            type: string
          uri:
            type: string
            format: uri
          entities:
            type: array
            items:
              type: string
  study:
    $ref: '#/$defs/Study'
required:
- model
- version
- study
$defs:
  TransformationRef:
    x-provenance:
      source: transformation_library
      conformance: cross-reference
    description: Reference to a TransformationTemplate in the Transformation & Method Library.
    type: object
    properties:
      transformationTemplateId:
        type: string
        description: 'Identifier of the referenced TransformationTemplate — matches the template''s conceptId (e.g. ''T.ChangeFromBaseline'',
          ''T.CFB_ANCOVA''). v0.7+: conceptId replaced the older oid field.'
    required:
    - transformationTemplateId
  SmartPhraseRef:
    x-provenance:
      source: transformation_library
      conformance: cross-reference
    description: Reference to a SmartPhrase template in the Transformation & Method Library.
    type: object
    properties:
      smartPhraseId:
        type: string
        description: Identifier of the referenced SmartPhrase
    required:
    - smartPhraseId
  ARSAnalysisRef:
    x-provenance:
      source: ars
      conformance: cross-reference
    description: Reference to an ARS Analysis. A study Analysis is-a ARS Analysis.
    type: object
    properties:
      analysisId:
        type: string
        description: Identifier of the referenced ARS Analysis
    required:
    - analysisId
  MethodOutputRef:
    x-provenance:
      source: transformation_library
      conformance: cross-reference
    description: 'Reference to a method output — the specific output (e.g. M.ANCOVA/output/contrasts_t) selected by an analysis
      as its summary measure. v0.7+: resolves to an entry in the referenced method''s outputs[] array (file at lib/methods/{analyses,derivations}/M_<conceptId>.json).'
    type: object
    properties:
      methodOutputId:
        type: string
        description: Identifier of the referenced method output (path-shaped, e.g. 'M.ANCOVA/output/contrasts_t'). The path
          segments are <method.conceptId>/output/<outputs[].name>.
    required:
    - methodOutputId
  IchE9R1Strategy:
    x-provenance:
      source: esap
      conformance: owned
    description: ICH E9(R1) strategy for handling an intercurrent event. Five typed values from ICH E9(R1) Step 4 (2019-11-20).
    type: string
    enum:
    - TreatmentPolicy
    - Hypothetical
    - Composite
    - WhileOnTreatment
    - PrincipalStratum
  AnalysisRole:
    x-provenance:
      source: esap
      conformance: owned
    description: The role an Analysis plays for its Estimand per ICH E9(R1).
    type: string
    enum:
    - MainEstimator
    - SensitivityAnalysis
    - SupplementaryAnalysis
  DataStructure:
    x-provenance:
      source: esap
      conformance: owned
    description: Twin qb:DataStructureDefinition shape, copied from the library TransformationTemplate into the study Transformation.
      Each study Transformation's inputDataStructure / outputDataStructure is a distinct qb:DataStructureDefinition with its
      own IRI — even when structurally identical to the library template's. Use inputDataStructure for the consumed qb:DataSet,
      outputDataStructure for the produced qb:DataSet. Direction is encoded structurally — no per-item direction field is
      needed.
    type: object
    properties:
      dimensions:
        type: array
        items:
          $ref: '#/$defs/DimensionEntry'
        description: qb:dimension components of this DSD.
      measures:
        type: array
        items:
          $ref: '#/$defs/MeasureEntry'
        description: qb:measure components of this DSD.
      slices:
        type: array
        items:
          $ref: '#/$defs/SliceTemplate'
        description: qb:Slice templates — fixed-dimension subsets of the DataSet. In a study Transformation, any {placeholder}
          tokens in constraint values are substituted in-place with the resolved values from sliceKeys[].value.
  DimensionEntry:
    x-provenance:
      source: esap
      conformance: owned
    description: A qb:dimension component of a DataStructure. Direction is encoded structurally by which DSD the entry lives
      in (inputDataStructure → input slot; outputDataStructure → output slot).
    type: object
    properties:
      input:
        type: string
        description: When present, FK to method.inputs[].name — declares which method input slot this dimension fills (typically
          a factor / fixed_effect role). Only meaningful inside inputDataStructure.
      output:
        type: string
        description: When present, FK to method.outputs[].name — declares which method output slot this dimension indexes.
          Only meaningful inside outputDataStructure.
      concept:
        type: string
        description: Concept bound to this dimension (e.g., 'Treatment', 'Subject'). The study may override the library template's
          concept here for narrower study-specific binding.
      conceptCategory:
        type: string
        description: Concept category bound to this dimension (e.g., 'ParameterDimension', 'VisitDimension'). Alternative
          to `concept` when binding to a category rather than a specific concept.
  MeasureEntry:
    x-provenance:
      source: esap
      conformance: owned
    description: A qb:measure component of a DataStructure. Direction is encoded structurally by which DSD the entry lives
      in.
    type: object
    properties:
      input:
        type: string
        description: When present, FK to method.inputs[].name — declares which method input slot this measure fills (typically
          the response / covariate). Only meaningful inside inputDataStructure.
      output:
        type: string
        description: When present, FK to method.outputs[].name — declares which method output slot this measure carries. Only
          meaningful inside outputDataStructure.
      concept:
        type: string
        description: Concept bound to this measure (e.g., 'Change', 'Measure', 'LSMeans'). The study may override the library
          template's concept for narrower study-specific binding.
      requiredValueType:
        type:
        - string
        - 'null'
        description: Required FHIR/data type for the bound concept (e.g. 'Quantity', 'CodeableConcept').
      slice:
        type: string
        description: Name reference to a SliceTemplate in this DataStructure's slices[] — restricts this measure to a specific
          cube slice.
      description:
        type: string
  SliceTemplate:
    x-provenance:
      source: esap
      conformance: owned
    description: A qb:Slice — a fixed-dimension subset of the DataSet. Copied from the library template. In a study Transformation,
      any {placeholder} tokens in constraint values are substituted in-place with the resolved values from sliceKeys[].value;
      the resolved values remain auditable via sliceKeys[].value alongside the source field.
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      constraints:
        type: array
        items:
          $ref: '#/$defs/SliceConstraint'
    required:
    - name
  SliceConstraint:
    x-provenance:
      source: esap
      conformance: owned
    description: A single constraint on a slice — pins a dimension to a specific value. In library templates the value may
      carry a {placeholder} token (e.g. '{parameter}'); in study Transformations, tokens are substituted in-place with the
      resolved value from the corresponding sliceKeys[] entry.
    type: object
    properties:
      dimension:
        type: string
        description: Dimension name being constrained (e.g., 'ParameterDimension', 'VisitDimension', 'Population').
      value:
        type: string
        description: Concrete value constraining the dimension. May carry a {placeholder} token in library templates; substituted
          in-place in study copies.
    required:
    - dimension
    - value
  SliceKey:
    x-provenance:
      source: esap
      conformance: owned
    description: A placeholder binding for the transformation. Library templates author this as {dimension, source} declaring
      the placeholder name and where its value is sourced from in the endpoint spec. Study Transformations add `value` filling
      in the resolved placeholder. The resolved value is also substituted in-place into matching {placeholder} tokens in slice
      constraint values, so consumers don't need to do placeholder lookup at consumption time — sliceKeys[].value remains
      for audit and re-rendering.
    type: object
    properties:
      dimension:
        type: string
        description: Placeholder name (e.g., 'ParameterDimension', 'VisitDimension', 'Population'). Also the {token} that
          appears in slice constraint values inside the library template.
      source:
        type: string
        description: Provenance — where this placeholder's value comes from in the endpoint spec (e.g., 'biomedicalConcept',
          'visit', 'population').
      value:
        type: string
        description: Study-resolved value filling the placeholder. Added by the eSAP author when the study Transformation
          is copied from the library template; absent in library templates.
    required:
    - dimension
  MethodConfiguration:
    x-provenance:
      source: esap
      conformance: owned
    description: A per-template default override of a method configuration parameter — copied verbatim from the library TransformationTemplate's
      methodConfigurations[]. Distinct from a study-resolved Configuration (which carries the actual study value).
    type: object
    properties:
      configurationName:
        type: string
        description: Configuration parameter name — matches method.configurations[].name.
      value:
        type: string
        description: Default value the template specifies. May be further overridden by Transformation.configurationValues
          at the study level.
    required:
    - configurationName
    - value
  Configuration:
    x-provenance:
      source: esap
      conformance: owned
    description: A study-resolved configuration parameter value for a study Transformation. Overrides the template-level MethodConfiguration
      default and the Method's defaultValue.
    type: object
    properties:
      name:
        type: string
        description: Configuration parameter name — matches method.configurations[].name (e.g. 'ss_type', 'alpha', 'imputation').
      value:
        type: string
        description: Study-resolved value for this configuration parameter.
    required:
    - name
    - value
  PhraseInstance:
    x-provenance:
      source: esap
      conformance: owned
    description: A resolved SmartPhrase — a template phrase with study-specific parameter values filled in
    type: object
    properties:
      basedOn:
        $ref: '#/$defs/SmartPhraseRef'
        description: The SmartPhrase template this resolved phrase is based on
      resolvedText:
        type: string
        description: The fully resolved text with all parameters substituted
    required:
    - basedOn
    - resolvedText
  ResolvedExpression:
    x-provenance:
      source: esap
      conformance: owned
    description: A method formula resolved with study-level concept bindings — the method provides the template, the transformation
      provides bindings, the study resolves to actual concepts and interactions
    type: object
    properties:
      notation:
        type: string
        enum:
        - assignment
        - wilkinson_rogers
        - survival
        description: Formula notation system from the method
      resolved:
        type: string
        description: The fully resolved expression with study-level concept names substituted (e.g., 'C.Change ~ C.Measure@Baseline
          + Treatment + Site')
      interactions:
        type: array
        items:
          type: string
        description: Active interaction terms in the resolved expression (e.g., ['C.Measure@Baseline:Treatment'])
    required:
    - notation
    - resolved
  OutputClassConfig:
    x-provenance:
      source: esap
      conformance: owned
    description: Study-level output dimension selection for a specific method output — restricts which method-declared indexed_by[]
      dimensions to include in the reported output. When absent for an output, all indexed_by[] dimensions are included.
    type: object
    properties:
      outputClass:
        type: string
        description: Name of the method output (e.g. 'type3_tests_f', 'ls_means', 'contrasts_t') — matches method.outputs[].name
          on the method invoked via the transformation's usesMethod.
      selectedDimensions:
        type: array
        items:
          type: string
        description: Subset of the output's indexed_by[] terms to include. Uses method-input role names or interaction tokens
          (e.g. 'fixed_effect', 'covariate:fixed_effect') from method.outputs[name].indexed_by[].
    required:
    - outputClass
    - selectedDimensions
  IceHandling:
    x-provenance:
      source: esap
      conformance: owned
    description: Per-estimand ICE handling — a reified (Estimand, IntercurrentEvent, Strategy) triple. Use when an estimand's
      strategy for an ICE differs from the study-default strategy on the ICE itself (e.g., primary estimand uses Hypothetical
      while a sensitivity estimand uses TreatmentPolicy on the same ICE).
    type: object
    properties:
      forIntercurrentEvent:
        type: string
        description: ID of the IntercurrentEvent this handling pertains to (matches an IntercurrentEvent.id under the same
          estimand)
      icheStrategy:
        $ref: '#/$defs/IchE9R1Strategy'
        description: The ICH E9(R1) strategy this estimand applies to the referenced ICE
      implementedBy:
        type: array
        items:
          type: object
          properties:
            transformationId:
              type: string
              description: ID of the Transformation (typically a Derivation under the Endpoint's hasTransformation) that operationalises
                this strategy
          required:
          - transformationId
        description: 'Transformation step(s) that operationalise this IceHandling''s strategy. Patterns: Composite → derivation
          folding the ICE into the variable; Hypothetical → imputation derivation; TreatmentPolicy → omitted (data used as
          observed); WhileOnTreatment → censoring derivation; PrincipalStratum → population-subsetting derivation. Multi-valued
          — a single strategy may split across several steps. Optional — TreatmentPolicy has no implementing transformation.'
    required:
    - forIntercurrentEvent
    - icheStrategy
  Transformation:
    x-provenance:
      source: esap
      conformance: owned
    description: 'A study-level transformation — a full copy of a library TransformationTemplate with study-specific resolutions.
      The Method is the only library artefact that stays referenced (via usesMethod); cube structure (twin DSDs), slice templates,
      sliceKeys, methodConfigurations, and validSmartPhrases are copied verbatim from the basedOn template and may be modified
      in-place for study specifics (e.g., concept narrowing on a measure, study override of a default configuration value).
      The study fills sliceKeys[].value and substitutes the resolved values in-place into matching {placeholder} tokens in
      slice constraint values, so consumers can read the eSAP without re-resolving against the library.


      Direction encoding: no explicit direction field exists anywhere on bindings — direction is structural via inputDataStructure
      vs outputDataStructure. The discriminator fields of the older Binding shape (direction, methodRole, dataStructureRole)
      collapse into structural placement: methodRole → DimensionEntry.input/output or MeasureEntry.input/output FK; dataStructureRole
      → dimensions[] vs measures[] array.


      Cube identity: each study Transformation''s inputDataStructure and outputDataStructure is a distinct qb:DataStructureDefinition
      with its own IRI, even when structurally identical to the library template''s. Study-specific overrides live in-place
      on the copied cube.'
    type: object
    properties:
      id:
        type: string
        description: Optional study-local identifier for this transformation. Required when an IceHandling.implementedBy needs
          to reference it.
      sequence:
        type: integer
        description: Execution order within the parent transformation list.
      basedOn:
        $ref: '#/$defs/TransformationRef'
        description: Provenance — the library TransformationTemplate this study Transformation was copied from.
      transformationType:
        type: string
        enum:
        - analysis
        - derivation
        description: Copied from the library template.
      usesMethod:
        type: string
        description: Method conceptId (e.g. 'M.ANCOVA', 'M.Subtraction'). The only library artefact that stays referenced
          rather than copied — the method body lives in the methods catalogue and is not inlined here.
      label:
        type: string
      shortLabel:
        type: string
      description:
        type: string
      inputDataStructure:
        $ref: '#/$defs/DataStructure'
        description: Cube structure for the input qb:DataSet — copied from the library template. Study may override concept
          fields on dimensions/measures for study-specific narrowing.
      outputDataStructure:
        $ref: '#/$defs/DataStructure'
        description: Cube structure for the output qb:DataSet — copied from the library template. Study may override concept
          fields for study-specific narrowing.
      sliceKeys:
        type: array
        items:
          $ref: '#/$defs/SliceKey'
        description: Placeholder bindings — copied from the library template; the study adds a `value` to each entry filling
          in the placeholder. Slice constraint values in inputDataStructure.slices[] (and outputDataStructure.slices[], if
          any) have their matching {placeholder} tokens substituted in-place with these values.
      methodConfigurations:
        type: array
        items:
          $ref: '#/$defs/MethodConfiguration'
        description: Per-template default overrides of method configurations — copied from the library template.
      validSmartPhrases:
        type: array
        items:
          type: string
        description: IDs of SmartPhrase templates valid for this transformation — copied from the library template.
      configurationValues:
        type: array
        items:
          $ref: '#/$defs/Configuration'
        description: Study-resolved configuration values for this transformation — overrides methodConfigurations defaults
          and the Method's defaultValue.
      hasPhraseInstance:
        type: array
        items:
          $ref: '#/$defs/PhraseInstance'
        description: Resolved SmartPhrase texts — the subset of validSmartPhrases this transformation actually realises with
          study-specific parameter values.
      resolvedExpression:
        $ref: '#/$defs/ResolvedExpression'
        description: The method formula resolved with study-level concept bindings and active interactions.
      hasOutputConfig:
        type: array
        items:
          $ref: '#/$defs/OutputClassConfig'
        description: Optional per-output dimension selection. When absent, all method-declared indexed_by[] dimensions are
          included for each output.
    required:
    - sequence
    - basedOn
    - transformationType
    - usesMethod
  Derivation:
    x-provenance:
      source: esap
      conformance: owned
    description: A study-level derivation — instantiates a TransformationTemplate to derive a variable for an endpoint
    allOf:
    - $ref: '#/$defs/Transformation'
  Analysis:
    x-provenance:
      source: esap
      conformance: owned
    description: A study-level analysis — instantiates a TransformationTemplate to produce statistical results. Is-a ARS Analysis.
    allOf:
    - $ref: '#/$defs/Transformation'
    - type: object
      properties:
        arsAnalysis:
          $ref: '#/$defs/ARSAnalysisRef'
          description: Link to the corresponding ARS Analysis definition
        analysisRole:
          $ref: '#/$defs/AnalysisRole'
          description: The role this analysis plays for its Estimand per ICH E9(R1) — MainEstimator (exactly one per estimand),
            SensitivityAnalysis, or SupplementaryAnalysis.
        summarizedByOutputClass:
          $ref: '#/$defs/MethodOutputRef'
          description: Per-analysis pointer to the MethodOutput that realises this analysis's summary measure (ICH E9(R1)
            attribute 5 implementation pointer).
  StudyTitle:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: Text representation of the study title'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      type:
        type: string
      text:
        type: string
    required:
    - id
    - text
  NarrativeContentItem:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: An individual content item within narrative content'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      text:
        type: string
    required:
    - id
  NarrativeContent:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: Structured narrative content within a document version, with recursive children'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      sectionNumber:
        type: string
      sectionTitle:
        type: string
      contentItem:
        $ref: '#/$defs/NarrativeContentItem'
        description: The content item for this section (0..1)
      children:
        type: array
        items:
          $ref: '#/$defs/NarrativeContent'
        description: Child narrative content sections (recursive, 0..*)
    required:
    - id
  AnalysisPopulation:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: A subset of the study population used for analysis'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
    required:
    - id
    - name
  StudyIntervention:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: A treatment or intervention applied in the study'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      type:
        type: string
      description:
        type:
        - string
        - 'null'
    required:
    - id
    - name
  IntercurrentEvent:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: An event occurring after treatment initiation that affects interpretation or existence of measurements.
      Carries a typed strategy code, a typed link to the per-event ScheduleTimeline, and a detection Transformation pointer.'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      strategy:
        type: string
        description: USDM free-text strategy field (per USDM-IG §4.17). Companion to the typed icheStrategy below; both coexist.
      icheStrategy:
        $ref: '#/$defs/IchE9R1Strategy'
        description: Typed ICH E9(R1) study-default strategy for this ICE. Per-estimand overrides go on Estimand.handlesIntercurrentEvent.
      hasScheduleTimeline:
        $ref: '#/$defs/ScheduleTimeline'
        description: Typed link to the per-event ScheduleTimeline detailing eligibility window via Timing instances, free-text
          trigger via entryCondition, and any response activities.
      detectedBy:
        $ref: '#/$defs/TransformationRef'
        description: The Transformation that detects this ICE's occurrence in subject data. The Transformation's Method carries
          the executable detection logic; inputs are concept bindings. Output is a per-subject boolean flag.
    required:
    - id
    - name
  ScheduleTimeline:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: A chronological schedule of planned temporal events (USDM-IG §4.14). One MAIN timeline per StudyDesign;
      additional timelines per anticipated intercurrent event. Attributes per USDM Timeline UML: id, name, label, description,
      entryCondition (free-text trigger), mainTimeline (boolean), plannedDuration (Duration). Relationships: entry, instances,
      exits, timings. Window bounds live on Timing.windowLower/Upper; direction on Timing.type. additionalProperties: true
      for pass-through of the full USDM Timeline payload.'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      entryCondition:
        type: string
        description: USDM free-text condition that triggers entry to this timeline (e.g. the human-readable ICE trigger).
          Structured/machine-readable detection sits on the IntercurrentEvent via detectedBy.
      mainTimeline:
        type: boolean
      plannedDuration:
        type: string
    required:
    - id
  SyntaxTemplate:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: A template definition with parameterizable text (SmartPhrase is-a SyntaxTemplate)'
    type: object
    additionalProperties: true
    properties:
      text:
        type: string
        description: Template text with parameter placeholders
      parameterMaps:
        type: array
        description: Parameter substitution maps
    required:
    - text
  StudyDefinitionDocumentVersion:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: A version of a study definition document'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      status:
        type: string
      version:
        type: string
      contents:
        type: array
        items:
          $ref: '#/$defs/NarrativeContent'
        description: Narrative content sections in this document version (0..*)
    required:
    - id
  StudyDefinitionDocument:
    x-provenance:
      source: usdm
      conformance: reference
    description: 'USDM: A study definition document (e.g. the eSAP). Note: type ''eSAP'' requires USDM codelist extension
      of C215477.'
    type: object
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      type:
        type: string
        description: Document type — 'eSAP' is a proposed extension to USDM codelist C215477
      templateName:
        type: string
      language:
        type: string
      versions:
