# ACDC Method Schema (LinkML)
#
# Encodes §3 of docs/superpowers/specs/2026-05-27-method-schema-design.md
# (revised 2026-05-28 after peer review). Methods are concept-free, reusable
# building blocks. They declare:
#   - Identity (conceptId, name, label, ncitCode, codings)
#   - A formula (Wilkinson-Rogers for analysis, assignment for derivation)
#   - inputs[] slots that downstream formulas and transformations reference
#     by name
#   - outputs[] slots typed by an output_type FK into output_class_templates,
#     plus a structural dataType for atomic outputs (the FHIR complex
#     datatype flows from the bound concept at transformation time)
#
# Methods MUST NOT reference clinical or analysis concepts. Concept binding
# happens at the transformation layer (see acdc_transformation.yaml).
#
# Changes vs the 2026-05-27 first cut:
#   - methodInput / methodOutput slots renamed to inputs / outputs.
#   - Cardinality enum reduced to {single, multiple} — multiple covers n=1.
#   - name slot repurposed: holds the preferred (long-form) term; label is
#     the short form / acronym. shortLabel removed.
#   - code (object) flattened to ncitCode (string).
#   - type / class / intent / assumptions removed.
#   - Per-output configurations removed from MethodOutput.

id: https://cdisc.org/acdc/method
name: acdc_method
title: ACDC Method Schema
description: >-
  Schema for ACDC method files (M_*.json). Methods are concept-free, reusable
  statistical/derivational primitives that define their own input slots,
  output slots, and configuration options. Transformations bind methods to
  concepts and supply cube structure.
version: 0.2.0
license: https://creativecommons.org/licenses/by/4.0/

prefixes:
  linkml: https://w3id.org/linkml/
  acdc:   https://cdisc.org/acdc/
  skos:   http://www.w3.org/2004/02/skos/core#
  ncit:   http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#
  stato:  http://purl.obolibrary.org/obo/STATO_
  fhir:   http://hl7.org/fhir/

default_prefix: acdc
default_range:  string

imports:
  - linkml:types


# ============================================================================
# Enums
# ============================================================================

enums:

  FormulaNotation:
    description: The grammar used by the method's formula. See lib/vocabulary/formula_grammar.json.
    permissible_values:
      wilkinson_rogers:
        description: "response ~ covariate + fixed_effect form (analysis methods)."
      assignment:
        description: "result := expression form (derivation methods)."
      survival:
        description: "Surv(time, event) ~ covariate form (survival-analysis methods like Cox PH, Kaplan-Meier, log-rank)."

  ConfigurationDataType:
    description: Data type of a method configuration value.
    permissible_values:
      decimal:
      string:
      code:
      boolean:
      integer:
      enum:
        description: Constrained to enumValues.
      object:
        description: A nested object (e.g. a window spec for visit assignment).
      object[]:
        description: An array of objects (e.g. a list of window specs).

  MethodInputDataType:
    description: Expected data type of a method input slot.
    permissible_values:
      decimal:
      string:
      code:
      boolean:
      integer:
      id:
        description: An identifier value (e.g. Subject ID).
      date:
        description: A date value (e.g. for date-difference computations).
      # Quantity intentionally NOT included — per the §3.4 principle, method
      # dataTypes are simple primitives only. FHIR complex types (Quantity,
      # CodeableConcept, Duration, ...) are concept-side concerns, supplied
      # by the bound concept's result.valueType at transformation time.

  Cardinality:
    description: >-
      How many bindings may fill a method input slot. Reduced from
      {single, multiple, single_or_multiple} on 2026-05-28: `multiple` now
      means "one or more" (covers the n=1 case), making the third value
      redundant.
    permissible_values:
      single:
        description: Exactly one binding required.
      multiple:
        description: One or more bindings required (includes the n=1 case).

  UnitPolicy:
    description: >-
      How a derivation method handles units on its output. Per §3.6.1, this is
      a per-output property (lives on MethodOutput, not Method).
    permissible_values:
      preserved:
        description: Output carries the source value's unit unchanged.
      inherited:
        description: Output inherits unit from the primary input.
      dimensionless:
        description: Output is unitless (e.g. ratios, fractions).
      fixed:
        description: Output has a fixed unit specified per-method (e.g. "%").
      derived:
        description: Output unit is computed from input units (e.g. source_unit × time_unit).
      computed:
        description: Output unit is computed (synonym for `derived` used by some existing files; reconcile during vocabulary cleanup).
      configured:
        description: Output unit is whatever the transformation supplies via configuration (e.g. M.UnitConversion's target_unit). Reconcile during vocabulary cleanup.

  # FHIRValueType enum removed 2026-05-28: methods no longer carry FHIR complex
  # datatypes (Quantity, CodeableConcept, ...) — the FHIR datatype flows from
  # the bound concept at transformation time via concept.result.valueType.
  # See §3.6 for the rationale.

  # The three axes from §3.5 (analysis output decomposition).
  # These are documented here for reference; the canonical vocabulary lives in
  # lib/vocabulary/output_class_templates.json. Method files reference an
  # output_type identifier that decomposes into a (class, shape, distribution)
  # tuple in that vocab file.

  OutputClass:
    description: >-
      §3.5.1 — the inferential ROLE of an analysis output (the "what is it
      for"). Vocabulary anchor for output_class_templates.json values.
    permissible_values:
      ls_means:
        description: Least-squares means / adjusted marginal means.
      contrast_estimates:
        description: Estimated contrasts between factor levels.
      contrast_tests:
        description: Hypothesis tests on contrasts (TStatistic + PValue).
      type3_tests:
        description: Type III omnibus tests of model terms.
      parameter_estimates:
        description: Solution for fixed effects (model coefficients).
      parameter_tests:
        description: Hypothesis tests on parameter estimates.
      fit_statistics:
        description: Overall model goodness-of-fit measures.
      test_result:
        description: A single overall test result (e.g. log-rank).
      survival_table:
        description: Life-table-style output (KM estimates).
      computed_value:
        description: A single derived scalar (e.g. mean, median, SD).

  OutputShape:
    description: §3.5.2 — the inferential PATTERN (the structure of the result).
    permissible_values:
      scalar:
        description: A single value.
      vector:
        description: One row per factor level / per term.
      matrix:
        description: Two-dimensional table indexed by two factors.

  Distribution:
    description: §3.5.3 — the probabilistic basis of the test statistic.
    permissible_values:
      F:
      t:
      chi_squared:
      normal:
      none:
        description: No test statistic (e.g. descriptive output).


# ============================================================================
# Classes
# ============================================================================

classes:

  Method:
    description: >-
      Top-level structure of an M_*.json file. Per §3.2, methods carry
      identity (§3.3), a formula contract (§3.4), input/output slots, and
      configurations. They never reference clinical or analysis concepts.
    tree_root: true
    attributes:
      schema_version:
        description: Version of this LinkML schema the file conforms to.
        range: string
      $schema:
        description: JSON Schema reference. Path to the JSON-Schema-Draft-2019-09 file generated from this LinkML.
        range: string
      $vocabulary:
        description: Map of vocabulary name → file path. Resolver hints for cross-file references (statistics, output_classes, formula_grammar, etc.).
        range: Any
      conceptId:
        description: §3.3 — the canonical identifier (e.g. M.ANCOVA). Matches the file basename minus `.json`. The field other ACDC files reference via `usesMethod`.
        range: string
        identifier: true
        required: true
        pattern: "^M\\.[A-Za-z0-9_]+$"
      name:
        description: §3.3 — preferred (written-out) term, SKOS-prefLabel style. E.g. "Analysis of Covariance" for M.ANCOVA, "Last Observation Carried Forward" for M.ImputedValue_LOCF. Distinct from `conceptId` (the machine identifier) and `label` (the short / acronym form).
        range: string
        required: true
      label:
        description: §3.3 — short / acronym form (e.g. "ANCOVA", "MMRM", "LOCF"). Used for compact display and SmartPhrase rendering. May equal `name` for methods without a recognized acronym.
        range: string
        required: true
      ncitCode:
        description: §3.3 — NCI C-code as a flat string (e.g. "C00001_NEW" while placeholder, eventually the assigned C-code). Null when unassigned. Replaces the previous {system, value} Code object.
        range: string
      codings:
        description: §3.3 — supplementary external code system mappings (STATO, third-party). Typically empty until a curator adds them.
        range: Coding
        multivalued: true
        inlined: true
        inlined_as_list: true
      description:
        description: Free-text method description.
        range: string
      formula:
        description: §3.4 — formula declaration. Token names in generic_expression MUST resolve to inputs[].name values.
        range: Formula
        required: true
      configurations:
        description: Method-level configuration options. Per-output configurations were removed during the 2026-05-28 revision.
        range: Configuration
        multivalued: true
        inlined: true
        inlined_as_list: true
      inputs:
        description: §3.4 — input slots. Slot names are formula tokens AND transformation-binding FK targets (referenced by `input` on transformation measure/dimension bindings).
        range: MethodInput
        multivalued: true
        inlined: true
        inlined_as_list: true
        required: true
      outputs:
        description: §3.5/§3.6 — output slots. Slot names are transformation-binding FK targets (referenced by `output` on transformation outputDataStructure.measures[] bindings).
        range: MethodOutput
        multivalued: true
        inlined: true
        inlined_as_list: true
        required: true

  Coding:
    description: A (system, code, display) coding. Used in `codings[]` for supplementary codes (STATO, etc.). Field names follow FHIR Coding convention (code + display, not value + label).
    attributes:
      system:
        range: string
        required: true
      code:
        range: string
        required: true
      display:
        range: string

  Any:
    description: Wildcard class accepting any JSON value. Used for slots like `$vocabulary` (object of strings) and `Configuration.defaultValue` (decimal | string | boolean depending on dataType).
    class_uri: linkml:Any

  Formula:
    description: §3.4 — the formula contract. The generic_expression's <token> identifiers MUST appear in the parent method's inputs[].name (or outputs[].name for the LHS of a derivation assignment).
    attributes:
      notation:
        range: FormulaNotation
        required: true
      default_expression:
        description: "Concrete example expression (e.g. 'response ~ covariate + fixed_effect')."
        range: string
        required: true
      generic_expression:
        description: "Pattern showing input slots in angle brackets (e.g. '<response> ~ <covariate>* + <fixed_effect>+')."
        range: string
        required: true
      notes:
        description: Author notes about the formula.
        range: string

  Configuration:
    description: A configuration option on a method. Values are supplied by transformations via `methodConfigurations[].value`.
    attributes:
      name:
        description: Configuration identifier within the parent method's configurations[]. Referenced from transformation `methodConfigurations[].configurationName`.
        range: string
        identifier: true
        required: true
      conforms_to:
        description: Optional FK into a controlled vocabulary (e.g. "alpha", "multiplicity_adjustment") for reusable configuration semantics.
        range: string
      dataType:
        description: Required unless `conforms_to` is set (in which case the dataType is inherited from the vocabulary entry referenced).
        range: ConfigurationDataType
      defaultValue:
        description: Default value if not supplied by the transformation. Type matches the parent dataType (decimal, string, boolean, enum value, ...).
        range: Any
      enumValues:
        description: Allowed values when dataType=enum.
        range: string
        multivalued: true
      description:
        range: string
      applicable_scopes:
        description: "Optional list of scopes where this configuration applies (e.g. ['universal'], ['per_test'])."
        range: string
        multivalued: true

  MethodInput:
    description: §3.4 — an input slot definition within a Method's inputs[]. `name` is both a formula token and a transformation-binding FK target.
    attributes:
      name:
        description: Slot identifier within inputs[]. Appears in formula.generic_expression as <name> and in transformation bindings via the `input` FK.
        range: string
        identifier: true
        required: true
      dataType:
        range: MethodInputDataType
        required: true
      required:
        range: boolean
        ifabsent: "boolean(true)"
      cardinality:
        range: Cardinality
        required: true
      description:
        range: string

  MethodOutput:
    description: >-
      §3.5/§3.6 — an output slot definition within a Method's outputs[]. For
      atomic outputs (descriptive analyses + derivations), `output_type` is
      `"computed_value"` and the structural primitive type is given by
      `dataType`. For structured analysis outputs, `output_type` references
      a multi-statistic template in output_class_templates.json (e.g.
      ls_means, type3_tests_f) and per-column types come from the template's
      statistics list. The FHIR complex datatype (Quantity, CodeableConcept,
      ...) is NOT carried here — it flows from the bound concept at
      transformation time via concept.result.valueType.
      Per-output configurations and value_type were removed in the
      2026-05-28 revision.
    attributes:
      name:
        description: Slot identifier within outputs[]. Referenced from transformation outputDataStructure.measures[].output.
        range: string
        identifier: true
        required: true
      dataType:
        description: >-
          §3.6 — structural primitive datatype the method produces in this
          output column. Parallels inputs[].dataType. Required for atomic
          outputs (output_type=computed_value); omitted for structured-table
          outputs (per-column types come from the template's statistics list
          via statistics_vocabulary.json). The FHIR complex datatype
          (Quantity, CodeableConcept, ...) is not on the method — it flows
          from the bound concept at transformation time. Validator checks
          compatibility at binding time (§6.6 rule 10).
        range: MethodInputDataType
      output_type:
        description: >-
          FK into lib/vocabulary/output_class_templates.json. For atomic
          outputs use `"computed_value"`; for structured analysis outputs
          use a multi-statistic template name (e.g. `"ls_means"`,
          `"type3_tests_f"`).
        range: string
      unit_policy:
        description: §3.6.1 — per-output unit-handling policy for derivation outputs.
        range: UnitPolicy
      indexed_by:
        description: >-
          For multi-row outputs (e.g. one row per factor level), the input
          slot names whose levels index the output rows. May include
          interaction tokens (e.g. "fixed_effect:fixed_effect").
        range: string
        multivalued: true
      examples:
        description: Optional worked-example entries (free-form). Author / documentation scaffolding; not consumed by validators.
        range: Any
        multivalued: true
      sub_types:
        description: Optional list of named sub-output specializations (e.g. for MMRM's ls_means broken down by group×time vs by group). Free-form; reviewed during the §3.5 vocabulary work.
        range: Any
        multivalued: true
      test_types:
        description: Optional list of named test specializations (e.g. for CoxPH/MANOVA outputs that aggregate multiple test variants). Free-form; reviewed during the §3.5 vocabulary work.
        range: Any
        multivalued: true


# ============================================================================
# Cross-field rules (§3.6.2, §3.4)
# ============================================================================

# Note: the constraint "method files MUST NOT reference clinical concepts"
# (§3.6.2) is enforced by the absence of any concept-typed slot in this
# schema — there is no slot that could carry a concept reference. The
# transformation schema is where concepts come in.

# Rule reserved for future: validate that formula.generic_expression's
# <token>s all resolve to inputs[].name (or outputs[].name for the LHS of a
# derivation assignment). Requires a parser; left to build-time validator.
